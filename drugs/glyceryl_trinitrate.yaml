---
aliases:
    - GTN
    - Nitroglycerin
class: Vasodilator
chemistry: Organic nitrate
dose:
    angina: 300-600µg SL PRN; may repeat Q5 min x3
    hypertension: 5-200µg/min IV
pharmaceutics:
    presentation:
      - 5mg/mL solution for IV
      - 400µg/dose sublingual spray
      - Transdermal patches
    compatibility:
    solubility: Poorly water-soluble; highly fat-soluble
pharmacokinetics:
    absorption:
        - Sublingual bioavailability ~40%, onset 1-3 minutes
        - Oral bioavailability ~1% (extensive first-pass hepatic metabolism)
        - Transdermal absorption variable
    distribution:
        pKa: -5.6
        vd: 3.3L/kg
        protein binding: 60%
    metabolism:
        half-life: ~30 minutes
        duration:
          - Sublingual ~35-45 minutes
          - IV offset within minutes
        pathway: Hepatic reductases, vascular walls, erythrocytes
        metabolites:
            - Glyceryl dinitrates (active; less potent)
            - Glyceryl mononitrates (inactive)
    elimination:
        renal: Metabolites
mechanism:
    target:
        - Soluble guanylate cyclase
    action: NO donor → activates sGC → ↑ cGMP → ↑ K+ conductance → membrane hyperpolarisation and ↓ intracellular Ca2+ → vascular smooth muscle relaxation. 
contraindications:
    - Severe aortic stenosis
    - Raised intracranial pressure
    - Hypovolaemia
pharmacodynamics:
    resp:
    cvs:
        - ↓ Preload (venodilatation)
        - ↓ Afterload
        - Coronary arterial vasodilation
        - Reflex ↑ HR
        - ↓ BP
    cns:
        - ↑ ICP (caution in neurological injury)
        - Headache (common)
    endo:
    msk:
    met:
    ren:
    gu:
    git:
    haeme:
        - Methaemoglobinaemia (rare)
considerations:
  - Tachyphylaxis develops with continuous use
  - Venodilation > arteriodilation at low doses, balanced at high doses
references: