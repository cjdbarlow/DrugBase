---
class: Inotrope
chemistry: Endogenous catecholamine
dose:
    shock: 1-50µg/kg/min
pharmaceutics:
    presentation: Clear, colourless solution with 200mg or 800mg in water
pharmacokinetics:
    absorption:
    distribution:
        pKa:
        vd:
        protein binding:
    metabolism:
        half-life: 3 minutes
        pathway:
            - 25% of dose converted to noradrenaline
            - Remainder metabolised by MAO and COMT
        metabolites:
    elimination:
        renal: Metabolites
mechanism:
    target:
        - D1 receptor
        - β1 adrenoreceptor
        - α1 adrenoreceptor
    action: D1 dominates at ≤5µg/kg/min. β1 dominate at 2-10µg/kg/min. α dominates >10µg/kg/min.
pharmacodynamics:
    resp:
    cvs:
        - ↑ Inotropy
        - ↑ HR
        - ↑ CO
        - Coronary vasodilation
        - ↑ SVR and PVR
        - ↑ VR
        - Tachyarrhythmias
    cns:
        - Inhibits prolactin secretion
        - Nausea
    endo:
    msk:
        - Necrosis with extravasation
    met:
    ren:
        - ↑ RBF and UO at low doses, not renoprotective
    gu:
    git:
        - Mesenteric vasodilation
    haeme:
